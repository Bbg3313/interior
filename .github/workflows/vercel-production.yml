# Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# Remote build on Vercel (vercel.json: installCommand / buildCommand with pnpm)
name: Vercel Production
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Secrets pasted from UI often include trailing newline/spaces → breaks prefix checks & CLI
      - name: Trim Vercel secrets for subsequent steps
        run: |
          node -e "
          const fs = require('fs');
          const t = (k) => String(process.env[k] || '').trim().replace(/[\r\n]/g, '');
          for (const k of ['VERCEL_TOKEN','VERCEL_ORG_ID','VERCEL_PROJECT_ID']) {
            fs.appendFileSync(process.env.GITHUB_ENV, k + '=' + t(k) + '\n');
          }
          "

      - name: Verify Vercel secrets are set
        run: |
          ok=1
          if [ -z "$VERCEL_TOKEN" ]; then echo "::error::VERCEL_TOKEN secret is empty"; ok=0; fi
          if [ -z "$VERCEL_ORG_ID" ]; then echo "::error::VERCEL_ORG_ID secret is empty"; ok=0; fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then echo "::error::VERCEL_PROJECT_ID secret is empty"; ok=0; fi
          echo "VERCEL_TOKEN length: ${#VERCEL_TOKEN}"
          [ "$ok" = 1 ] || exit 1
          case "$VERCEL_PROJECT_ID" in
            prj_*) ;;
            *)
              echo "::error::VERCEL_PROJECT_ID must start with prj_ (swap with ORG_ID or re-copy from Vercel → Settings → General)."
              exit 1
              ;;
          esac
          case "$VERCEL_ORG_ID" in
            team_*|user_*) ;;
            *)
              echo "::warning::VERCEL_ORG_ID does not start with team_ or user_. If deploy fails, re-copy Team ID from Vercel (Project → Settings → General)."
              ;;
          esac

      - name: Write .vercel/project.json
        run: |
          mkdir -p .vercel
          node -e "require('fs').writeFileSync('.vercel/project.json', JSON.stringify({projectId:process.env.VERCEL_PROJECT_ID, orgId:process.env.VERCEL_ORG_ID, projectName:'interior-main'}));"

      # CLI reads VERCEL_TOKEN from env; avoid --token=… quoting issues
      - name: Deploy to Vercel (production)
        run: npx vercel@latest deploy --prod --yes --logs --debug
