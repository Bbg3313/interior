# Deploy production on push to main. Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
name: Vercel Production
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      # CLI reads VERCEL_TOKEN from env; org/project from VERCEL_ORG_ID / VERCEL_PROJECT_ID
      - name: Deploy to Vercel (remote build)
        run: npx vercel@latest deploy --prod --yes
