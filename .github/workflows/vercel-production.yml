# Secret: VERCEL_TOKEN only (project/org ids come from .vercel/project.json in the repo)
# Remote build on Vercel (vercel.json: installCommand / buildCommand with pnpm)
name: Vercel Production
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Trim VERCEL_TOKEN
        run: |
          node -e "
          const fs = require('fs');
          const t = String(process.env.VERCEL_TOKEN || '').trim().replace(/[\r\n]/g, '');
          fs.appendFileSync(process.env.GITHUB_ENV, 'VERCEL_TOKEN=' + t + '\n');
          "

      - name: Verify Vercel token
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then echo "::error::VERCEL_TOKEN secret is empty"; exit 1; fi
          echo "VERCEL_TOKEN length: ${#VERCEL_TOKEN}"

      - name: Deploy to Vercel (production)
        run: npx vercel@latest deploy --prod --yes --logs
