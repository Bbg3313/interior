# Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# Remote build on Vercel (vercel.json: installCommand / buildCommand with pnpm)
name: Vercel Production
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify Vercel secrets are set
        run: |
          ok=1
          if [ -z "$VERCEL_TOKEN" ]; then echo "::error::VERCEL_TOKEN secret is empty"; ok=0; fi
          if [ -z "$VERCEL_ORG_ID" ]; then echo "::error::VERCEL_ORG_ID secret is empty"; ok=0; fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then echo "::error::VERCEL_PROJECT_ID secret is empty"; ok=0; fi
          echo "VERCEL_TOKEN length: ${#VERCEL_TOKEN}"
          [ "$ok" = 1 ] || exit 1
          # Catch the common mistake of swapping IDs (instant CLI failure, ~15–20s)
          case "$VERCEL_PROJECT_ID" in
            prj_*) ;;
            *)
              echo "::error::VERCEL_PROJECT_ID must start with prj_. Yours does not — check GitHub Secrets; you may have put Team ID and Project ID in the wrong variables."
              exit 1
              ;;
          esac
          case "$VERCEL_ORG_ID" in
            team_*|user_*) ;;
            *)
              echo "::error::VERCEL_ORG_ID should start with team_ or user_ (Team / Personal ID from Vercel → Project → Settings → General)."
              exit 1
              ;;
          esac

      - name: Write .vercel/project.json
        run: |
          mkdir -p .vercel
          node -e "require('fs').writeFileSync('.vercel/project.json', JSON.stringify({projectId:process.env.VERCEL_PROJECT_ID, orgId:process.env.VERCEL_ORG_ID, projectName:'interior-main'}));"

      # CLI reads VERCEL_TOKEN from env; avoid --token=… quoting issues
      - name: Deploy to Vercel (production)
        run: npx vercel@latest deploy --prod --yes --logs --debug
